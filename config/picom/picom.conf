backend = "glx";
vsync = true;
use-damage = true;

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.35;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#000000";

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 6;

inactive-opacity = 0.92;
frame-opacity = 1.0;
active-opacity = 1.0;

corner-radius = 10;
rounded-corners-exclude = [
    "class_g = 'flameshot'",
    "class_g = 'Rofi'",
    "class_g = 'rofi'",
    "class_g = 'Notification'",
    "class_g = 'copyq'",
    "class_g = 'Nm-applet'",
    "class_g = 'Blueman-applet'",
    "class_g = 'Pasystray'",
    "class_g = 'Plank'",
];

blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;
blur-background-frame = true;
blur-background-exclude = [
    "class_g = 'Rofi'",
    "class_g = 'rofi'",
    "class_g = 'flameshot'",
    "class_g = 'copyq'",
    "class_g = 'Nm-applet'",
    "class_g = 'Blueman-applet'",
    "class_g = 'Pasystray'",
    "class_g = 'Slack'",
    "class_g = 'Google-chrome'",
    "class_g = 'Chromium'",
    "class_g = 'awesome'",
    "class_g = 'Plank'",
    "name = 'dock'",
];

opacity-rule = [
    "90:class_g = 'kitty'",
    "95:class_g = 'Thunar'",
    "100:class_g = 'flameshot'",
    "100:class_g = 'Rofi'",
    "100:class_g = 'rofi'",
    "100:class_g = 'awesome'",
    "100:class_g = 'Plank'",
    "100:window_type = 'dock'",
];

wintypes:{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; };
    dock = { shadow = true; shadow-radius = 32; shadow-opacity = 0.55; opacity = 1.0; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
