backend = "glx";
vsync = true;
use-damage = true;

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.35;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#000000";
shadow-exclude = [
    "name = 'awesome-tray-host'",
    "class_g = 'awesome'",
    "class_g = 'Slack'",
    "class_g = 'Viber'",
    "class_g = 'discord'",
    "class_g = 'Spotify'",
    "class_g = 'TelegramDesktop'",
    "window_type = 'popup_menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'menu'",
];

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 6;

inactive-opacity = 0.92;
frame-opacity = 1.0;
active-opacity = 1.0;

corner-radius = 10;
rounded-corners-exclude = [
    "class_g = 'flameshot'",
    "class_g = 'Rofi'",
    "class_g = 'rofi'",
    "class_g = 'Notification'",
    "class_g = 'copyq'",
    "class_g = 'Nm-applet'",
    "class_g = 'Blueman-applet'",
    "class_g = 'Pasystray'",
    "class_g = 'Plank'",
    "class_g = 'Slack'",
    "name = 'awesome-tray-host'",
    "name = 'awesome-tray-menu'",
    "name = 'awesome-tray-menu-overlay'",
    "window_type = 'popup_menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'menu'",
];

blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;
blur-background-frame = true;
blur-background-exclude = [
    "class_g = 'Rofi'",
    "class_g = 'rofi'",
    "class_g = 'flameshot'",
    "class_g = 'copyq'",
    "class_g = 'Nm-applet'",
    "class_g = 'Blueman-applet'",
    "class_g = 'Pasystray'",
    "class_g = 'Slack'",
    "class_g = 'Google-chrome'",
    "class_g = 'Chromium'",
    "class_g = 'awesome'",
    "class_g = 'Plank'",
    "name = 'awesome-tray-host'",
    "name = 'awesome-tray-menu'",
    "name = 'awesome-tray-menu-overlay'",
    "window_type = 'popup_menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'menu'",
];

opacity-rule = [
    "90:class_g = 'kitty'",
    "95:class_g = 'Thunar'",
    "100:class_g = 'flameshot'",
    "100:class_g = 'Rofi'",
    "100:class_g = 'rofi'",
    "100:class_g = 'awesome'",
    "100:class_g = 'Plank'",
    "100:window_type = 'dock'",
    "0:name = 'awesome-tray-host'",
];

wintypes:{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; };
    dock = { shadow = true; shadow-radius = 32; shadow-opacity = 0.55; opacity = 1.0; };
    utility = { shadow = false; blur-background = false; fade = false; };
    dnd = { shadow = false; };
    popup_menu = { focus = true; shadow = false; blur-background = false; opacity = 1.0; };
    dropdown_menu = { focus = true; shadow = false; blur-background = false; opacity = 1.0; };
    menu = { focus = true; shadow = false; blur-background = false; opacity = 1.0; };
};
