[colors]
transparent    = #00000000
background     = #1E1E2E
background-alt = #1E1E2E
foreground     = #CDD6F4
surface0       = #313244
surface1       = #45475a
overlay0       = #6c7086
rosewater      = #f5e0dc
flamingo       = #f2cdcd
pink           = #f5c2e7
mauve          = #cba6f7
red            = #f38ba8
maroon         = #eba0ac
peach          = #fab387
yellow         = #f9e2af
green          = #a6e3a1
teal           = #94e2d5
sky            = #89dceb
sapphire       = #74c7ec
blue           = #89b4fa
lavender       = #b4befe

;  ____               _
; | __ )  __ _ _ __  / |
; |  _ \ / _` | '__| | |
; | |_) | (_| | |    | |
; |____/ \__,_|_|    |_|
;

[bar/bar1]
width          = 100%
height         = 60
;radius        = 10
;dpi           = 96
fixed-center   = true
override-redirect = true

background     = ${colors.background}
foreground     = ${colors.foreground}

line-size      = 0

;border-size   = 3pt
border-color   = #00000000

padding-left   = 1
padding-right  = 1

module-margin  = 1

font-0         = JetBrainsMono Nerd Font Mono:style=Regular:size=11:file=/usr/share/fonts/TTF/JetBrainsMonoNerdFontMono-Regular.ttf;8
font-1         = JetBrainsMono Nerd Font Mono:style=Regular:size=18:file=/usr/share/fonts/TTF/JetBrainsMonoNerdFontMono-Regular.ttf;6
font-2         = JetBrainsMono Nerd Font Mono:style=Regular:size=22:file=/usr/share/fonts/TTF/JetBrainsMonoNerdFontMono-Regular.ttf;4
font-3         = JetBrainsMono Nerd Font Mono:style=Regular:size=18:file=/usr/share/fonts/TTF/JetBrainsMonoNerdFontMono-Regular.ttf;8
font-4         = JetBrainsMono Nerd Font Mono:style=Regular:size=13:file=/usr/share/fonts/TTF/JetBrainsMonoNerdFontMono-Regular.ttf;8
font-5         = JetBrainsMono Nerd Font Mono:style=Regular:size=16:file=/usr/share/fonts/TTF/JetBrainsMonoNerdFontMono-Regular.ttf;6

modules-left   = custom-menu xworkspaces xwindow
modules-center =
modules-right  = cpu memory filesystem battery0 battery1 network volume bluetooth date power

cursor-click   = pointer
cursor-scroll  = ns-resize

enable-ipc     = true

;separator = |
;separator-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = false

;  __  __           _       _
; |  \/  | ___   __| |_   _| | ___  ___
; | |\/| |/ _ \ / _` | | | | |/ _ \/ __|
; | |  | | (_) | (_| | |_| | |  __/\__ \
; |_|  |_|\___/ \__,_|\__,_|_|\___||___/
;

[module/custom-menu]
type                          = custom/script
exec                          = ~/.config/polybar/scripts/menu.sh
interval                      = 3600

format-foreground             = ${colors.blue}
format-padding                = 0

click-left                    = "rofi -show run"
click-right                   = "${HOME}/.config/rofi/scripts/powermenu.sh"

[module/xworkspaces]
type                          = internal/xworkspaces

label-active                  = %name%
label-active-background       = ${colors.surface1}
label-active-foreground       = ${colors.mauve}
label-active-padding          = 1

label-occupied                = %name%
label-occupied-padding        = 1

label-urgent                  = %name%
label-urgent-background       = ${colors.background-alt}
label-urgent-padding          = 1

label-empty                   = %name%
label-empty-foreground        = ${colors.foreground}
label-empty-padding           = 1

[module/xwindow]
type                          = internal/xwindow
label                         = %title:0:60:...%

[module/date]
type                          = internal/date
interval                      = 1

date                          = %h %d.%m.%Y %H:%M
date-alt                      = %A, %h %d.%m.%Y %H:%M:%S

label                         = %date%
label-foreground              = ${colors.foreground}

[module/volume]
type                          = custom/script
exec                          = ~/.config/polybar/scripts/volume.sh
interval                      = 1

format-foreground             = ${colors.sky}
format-padding                = 1

click-left                    = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/polybar/scripts/volume-picker.sh"
click-right                   = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/polybar/scripts/volume-mute.sh"
scroll-up                     = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/polybar/scripts/volume-scroll.sh up"
scroll-down                   = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/polybar/scripts/volume-scroll.sh down"

[module/network]
type                          = custom/script
exec                          = ~/.config/polybar/scripts/network.sh
interval                      = 3

format-foreground             = ${colors.lavender}
format-padding                = 1

click-left                    = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/polybar/scripts/wifi-picker.sh"
click-right                   = "nmcli radio wifi toggle"
click-middle                  = "nm-connection-editor"

[module/bluetooth]
type                          = custom/script
exec                          = ~/.config/polybar/scripts/bluetooth.sh
interval                      = 3

format-foreground             = ${colors.blue}
format-padding                = 1

click-left                    = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/polybar/scripts/bluetooth-picker.sh"
click-right                   = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/polybar/scripts/bluetooth-toggle.sh"
click-middle                  = "blueman-manager"

[module/power]
type                          = custom/script
exec                          = ~/.config/polybar/scripts/power.sh
interval                      = 60

format-padding                = 2

click-left                    = "/usr/bin/bash ${HOME}/.config/polybar/scripts/run-module-click.sh /usr/bin/bash ${HOME}/.config/rofi/scripts/powermenu.sh"

[module/cpu]
type                          = internal/cpu
interval                      = 2
format-foreground             = ${colors.peach}
label-font                    = 5
label                         = 󰻠 %percentage%%

[module/memory]
type                          = internal/memory
interval                      = 2
format-foreground             = ${colors.yellow}
label-font                    = 5
label                         = 󰍛 %gb_used%

[module/filesystem]
type                          = internal/fs
interval                      = 25

mount-0                       = /

format-mounted-foreground     = ${colors.green}
label-mounted-font            = 5
label-mounted                 = 󰋊 %percentage_used%%

[module/battery0]
type                          = internal/battery

full-at                       = 90
low-at                        = 10

battery                       = BAT0
adapter                       = ADP1

poll-interval                 = 5
time-format                   = %H:%M

label-charging-font           = 5
label-discharging-font        = 5
label-full-font               = 5
label-low-font                = 5
label-charging                = 󱟠 %percentage%% - %time%h
label-discharging             = 󱟞 %percentage%% - %time%h
label-full                    = 󰂄 Full
label-low                     = 󰂃 LOW - %time%h

format-charging-foreground    = ${colors.blue}
format-discharging-foreground = ${colors.blue}
format-full-foreground        = ${colors.blue}

[module/battery1]
type                          = internal/battery

full-at                       = 90
low-at                        = 10

battery                       = BAT1
adapter                       = ADP1

poll-interval                 = 5
time-format                   = %H:%M

label-charging-font           = 5
label-discharging-font        = 5
label-full-font               = 5
label-low-font                = 5
label-charging                = 󱟠 %percentage%% - %time%h
label-discharging             = 󱟞 %percentage%% - %time%h
label-full                    = 󰂄 Full
label-low                     = 󰂃 LOW - %time%h

format-charging-foreground    = ${colors.blue}
format-discharging-foreground = ${colors.blue}
format-full-foreground        = ${colors.blue}

[module/systray]
type                          = internal/tray

format-margin                 = 4pt
tray-spacing                  = 8pt
tray-padding                  = 4pt
