# Catppuccin Mocha login screen — matches ~/.config/gtk-3.0/settings.ini
[greeter]
background=/usr/share/backgrounds/awesome-catppuccin/eva-mocha.png
user-background=false
theme-name=catppuccin-mocha-mauve-standard+default
icon-theme-name=Papirus-Dark
cursor-theme-name=Adwaita
font-name=Noto Sans 11
xft-antialias=true
xft-hintstyle=hintmedium
xft-rgba=rgb
position=50% 50%
round-user-image=true
hide-user-image=false
panel-position=top
clock-format=%a %b %d  %H:%M
indicators=~spacer;~clock;~spacer;~power;~session;~layout
transition-duration=800
transition-type=ease-in-out
screensaver-timeout=300
